openapi: 3.1.0
info:
  title: Global Patient Hub API
  version: 1.0.0
  summary: International patient marketplace, coordinator CRM, quote and booking API.
  description: >
    v1 API for a compliance-first Korean international patient acquisition platform.
    The API separates public patient flows, provider workflows, admin/coordinator operations,
    and partner referral operations.
servers:
  - url: https://api.globalpatienthub.example.com
    description: Production
  - url: http://localhost:8787
    description: Local development
tags:
  - name: Public Patient
  - name: Provider
  - name: Admin
  - name: Partner
security:
  - bearerAuth: []
paths:
  /v1/procedures:
    get:
      tags: [Public Patient]
      security: []
      summary: List approved procedures
      operationId: listProcedures
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: category
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Approved procedures
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProcedureListItem"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /v1/procedures/{slug}:
    get:
      tags: [Public Patient]
      security: []
      summary: Get approved procedure detail
      operationId: getProcedureBySlug
      parameters:
        - $ref: "#/components/parameters/Locale"
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Procedure detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/providers:
    get:
      tags: [Public Patient]
      security: []
      summary: Search verified providers
      operationId: searchProviders
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: procedure_slug
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: facility_type
          in: query
          schema:
            $ref: "#/components/schemas/FacilityType"
      responses:
        "200":
          description: Verified public providers
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderListItem"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /v1/providers/{id}:
    get:
      tags: [Public Patient]
      security: []
      summary: Get verified provider detail
      operationId: getProvider
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "200":
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/leads:
    post:
      tags: [Public Patient]
      security: []
      summary: Create consultation lead
      operationId: createLead
      parameters:
        - $ref: "#/components/parameters/Locale"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadCreateRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/patients/eligibility-check:
    post:
      tags: [Public Patient]
      security: []
      summary: Check foreign-patient eligibility
      operationId: checkPatientEligibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityCheckRequest"
      responses:
        "200":
          description: Eligibility decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/intakes:
    post:
      tags: [Public Patient]
      summary: Submit medical intake
      operationId: submitIntake
      parameters:
        - $ref: "#/components/parameters/Locale"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeCreateRequest"
      responses:
        "201":
          description: Intake submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intake"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/cases/{id}:
    get:
      tags: [Public Patient]
      summary: Get my case status
      operationId: getCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Case status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/cases/{id}/quotes:
    get:
      tags: [Public Patient]
      summary: List quotes for my case
      operationId: listCaseQuotes
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Case quotes
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Quote"

  /v1/quotes/{id}/accept:
    post:
      tags: [Public Patient]
      summary: Accept quote
      operationId: acceptQuote
      parameters:
        - $ref: "#/components/parameters/QuoteId"
      responses:
        "200":
          description: Quote accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteAcceptResponse"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/bookings:
    post:
      tags: [Public Patient]
      summary: Request booking
      operationId: createBooking
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateRequest"
      responses:
        "201":
          description: Booking requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/payments/deposit:
    post:
      tags: [Public Patient]
      summary: Create or confirm deposit payment
      operationId: payDeposit
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentDepositRequest"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/messages:
    post:
      tags: [Public Patient]
      summary: Send patient message
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageCreateRequest"
      responses:
        "201":
          description: Message stored or queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /v1/provider/cases:
    get:
      tags: [Provider]
      summary: List assigned provider cases
      operationId: providerListCases
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CaseStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Provider case list
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderCaseSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /v1/provider/cases/{id}:
    get:
      tags: [Provider]
      summary: Get assigned provider case detail
      operationId: providerGetCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Provider-safe case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCaseDetail"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/provider/quote-requests/{id}/quotes:
    post:
      tags: [Provider]
      summary: Create quote for quote request
      operationId: providerCreateQuote
      parameters:
        - $ref: "#/components/parameters/QuoteRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteCreateRequest"
      responses:
        "201":
          description: Quote created and commission checked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteCreateResponse"
        "422":
          description: Compliance validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/provider/quotes/{id}:
    patch:
      tags: [Provider]
      summary: Update draft quote
      operationId: providerUpdateQuote
      parameters:
        - $ref: "#/components/parameters/QuoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotePatchRequest"
      responses:
        "200":
          description: Quote updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/provider/availability-slots:
    post:
      tags: [Provider]
      summary: Create provider availability slot
      operationId: providerCreateAvailabilitySlot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySlotCreateRequest"
      responses:
        "201":
          description: Availability slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"

  /v1/provider/bookings/{id}:
    patch:
      tags: [Provider]
      summary: Confirm or update booking
      operationId: providerUpdateBooking
      parameters:
        - $ref: "#/components/parameters/BookingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingPatchRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /v1/provider/packages:
    post:
      tags: [Provider]
      summary: Submit treatment package for content review
      operationId: providerCreatePackage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageCreateRequest"
      responses:
        "201":
          description: Package created in pending review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPackage"

  /v1/provider/compliance-documents:
    post:
      tags: [Provider]
      summary: Upload provider compliance document metadata
      operationId: providerUploadComplianceDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceDocumentUploadRequest"
      responses:
        "201":
          description: Document registered for verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceDocument"

  /v1/provider/performance:
    get:
      tags: [Provider]
      summary: Provider lead and revenue performance
      operationId: providerPerformance
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Provider performance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderPerformance"

  /v1/admin/cases:
    get:
      tags: [Admin]
      summary: List all cases for coordinator/admin CRM
      operationId: adminListCases
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CaseStatus"
        - name: owner_coordinator_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Admin case list
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCaseSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /v1/admin/cases/{id}/assign:
    post:
      tags: [Admin]
      summary: Assign coordinator to case
      operationId: adminAssignCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseAssignRequest"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /v1/admin/cases/{id}/match:
    post:
      tags: [Admin]
      summary: Run matching engine for case
      operationId: adminMatchCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchRequest"
      responses:
        "200":
          description: Ranked matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResponse"

  /v1/admin/compliance/providers:
    get:
      tags: [Admin]
      summary: Provider registration and insurance compliance queue
      operationId: adminProviderCompliance
      responses:
        "200":
          description: Provider compliance list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderComplianceItem"

  /v1/admin/compliance/commission-violations:
    get:
      tags: [Admin]
      summary: List failed commission checks
      operationId: adminCommissionViolations
      responses:
        "200":
          description: Commission violations
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommissionViolation"

  /v1/admin/content-reviews/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve content review
      operationId: adminApproveContentReview
      parameters:
        - $ref: "#/components/parameters/ContentReviewId"
      responses:
        "200":
          description: Content approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReview"

  /v1/admin/content-reviews/{id}/reject:
    post:
      tags: [Admin]
      summary: Reject content review
      operationId: adminRejectContentReview
      parameters:
        - $ref: "#/components/parameters/ContentReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentRejectRequest"
      responses:
        "200":
          description: Content rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReview"

  /v1/admin/reports/annual-performance:
    get:
      tags: [Admin]
      summary: Export annual performance report data
      operationId: adminAnnualPerformanceReport
      parameters:
        - name: report_year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: provider_id
          in: query
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Annual performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualPerformanceReport"
            text/csv:
              schema:
                type: string

  /v1/admin/attribution:
    get:
      tags: [Admin]
      summary: Marketing attribution report
      operationId: adminAttribution
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attribution report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionReport"

  /v1/admin/settlements:
    get:
      tags: [Admin]
      summary: Settlement report
      operationId: adminSettlements
      parameters:
        - name: provider_id
          in: query
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            type: string
            example: "2026-06"
      responses:
        "200":
          description: Settlements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementReport"

  /v1/partners/referral-links:
    post:
      tags: [Partner]
      summary: Create partner referral link
      operationId: partnerCreateReferralLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralLinkCreateRequest"
      responses:
        "201":
          description: Referral link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralLink"

  /v1/partners/leads:
    get:
      tags: [Partner]
      summary: List partner-attributed leads
      operationId: partnerListLeads
      responses:
        "200":
          description: Partner leads
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PartnerLead"
    post:
      tags: [Partner]
      summary: Register partner-sourced lead
      operationId: partnerCreateLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerLeadCreateRequest"
      responses:
        "201":
          description: Partner lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadCreateResponse"

  /v1/partners/commissions:
    get:
      tags: [Partner]
      summary: List partner commissions
      operationId: partnerListCommissions
      responses:
        "200":
          description: Partner commissions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PartnerCommission"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Locale:
      name: X-Locale
      in: header
      required: false
      schema:
        type: string
        enum: [en, ja, zh, th, vi, ru, ko, ar]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 160
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CaseId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteRequestId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContentReviewId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: State conflict or idempotency conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    LocalizedString:
      type: object
      additionalProperties:
        type: string
      example:
        en: Rhinoplasty
        ja: Rhinoplasty
        zh: Rhinoplasty

    FacilityType:
      type: string
      enum: [clinic, hospital, general_hospital, tertiary_hospital]

    CaseStatus:
      type: string
      enum:
        - new
        - qualified
        - intake_completed
        - matching_ready
        - matched
        - quote_requested
        - quote_sent
        - deposit_pending
        - deposit_paid
        - booking_confirmed
        - visited
        - treated
        - aftercare
        - closed_won
        - closed_lost

    ProcedureListItem:
      type: object
      required: [id, slug, name, recovery_days_min, recovery_days_max]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          $ref: "#/components/schemas/LocalizedString"
        recovery_days_min:
          type: integer
        recovery_days_max:
          type: integer
        requires_medical_review:
          type: boolean

    ProcedureDetail:
      allOf:
        - $ref: "#/components/schemas/ProcedureListItem"
        - type: object
          required: [description, content]
          properties:
            description:
              $ref: "#/components/schemas/LocalizedString"
            content:
              type: object
              additionalProperties: true
            price_disclaimer:
              type: string

    ProviderListItem:
      type: object
      required: [id, name_display, facility_type, address, languages, average_response_minutes]
      properties:
        id:
          type: string
          format: uuid
        name_display:
          $ref: "#/components/schemas/LocalizedString"
        facility_type:
          $ref: "#/components/schemas/FacilityType"
        address:
          type: string
        languages:
          type: array
          items:
            type: string
        average_response_minutes:
          type: integer
        quality_score:
          type: number
        sponsored:
          type: boolean
          default: false

    ProviderDetail:
      allOf:
        - $ref: "#/components/schemas/ProviderListItem"
        - type: object
          required: [doctors, packages, registrations]
          properties:
            doctors:
              type: array
              items:
                $ref: "#/components/schemas/DoctorSummary"
            packages:
              type: array
              items:
                $ref: "#/components/schemas/TreatmentPackage"
            registrations:
              type: array
              items:
                $ref: "#/components/schemas/ProviderRegistrationPublic"

    DoctorSummary:
      type: object
      required: [id, name, specialty, languages]
      properties:
        id:
          type: string
          format: uuid
        name:
          $ref: "#/components/schemas/LocalizedString"
        specialty:
          type: string
        years_experience:
          type: integer
        languages:
          type: array
          items:
            type: string

    ProviderRegistrationPublic:
      type: object
      required: [registration_type, verified_status, expires_at]
      properties:
        registration_type:
          type: string
          enum: [foreign_patient_provider, facilitator]
        verified_status:
          type: string
          enum: [verified]
        expires_at:
          type: string
          format: date

    LeadCreateRequest:
      type: object
